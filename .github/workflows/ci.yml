name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  BUN_VERSION: '1.2.5'

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bun run lint

      - name: Run TypeScript type check
        run: bun run typecheck

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bun run test -- --reporter=verbose

      - name: Generate coverage report
        run: bun run test:coverage

      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        if: github.event_name == 'push'
        with:
          files: ./coverage/coverage-final.json
          fail_ci_if_error: false

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Build application
        run: bun run build
        env:
          SKIP_ENV_VALIDATION: 'true'
          NEXT_PUBLIC_APPWRITE_ENDPOINT: 'https://test.appwrite.io/v1'
          NEXT_PUBLIC_APPWRITE_PROJECT_ID: 'test-project'
          NEXT_PUBLIC_APPWRITE_DATABASE_ID: 'test-db'
          NEXT_PUBLIC_APPWRITE_CONTACTS_COLLECTION_ID: 'test-contacts'
          NEXT_PUBLIC_APPWRITE_CAMPAIGNS_COLLECTION_ID: 'test-campaigns'
          NEXT_PUBLIC_APPWRITE_TEMPLATES_COLLECTION_ID: 'test-templates'
          NEXT_PUBLIC_APPWRITE_CONTACT_GROUPS_COLLECTION_ID: 'test-groups'
          NEXT_PUBLIC_APPWRITE_ATTACHMENTS_BUCKET_ID: 'test-bucket'
          NEXT_PUBLIC_APPWRITE_DRAFT_EMAILS_COLLECTION_ID: 'test-drafts'
          NEXT_PUBLIC_APPWRITE_SIGNATURES_COLLECTION_ID: 'test-sigs'
          NEXT_PUBLIC_APPWRITE_UNSUBSCRIBES_COLLECTION_ID: 'test-unsubs'
          NEXT_PUBLIC_APPWRITE_WEBHOOKS_COLLECTION_ID: 'test-webhooks'
          NEXT_PUBLIC_APPWRITE_TRACKING_EVENTS_COLLECTION_ID: 'test-tracking'
          NEXT_PUBLIC_APPWRITE_AB_TESTS_COLLECTION_ID: 'test-ab'
          NEXTAUTH_SECRET: 'ci-nextauth-secret'
          GOOGLE_CLIENT_ID: 'ci-google-client'
          GOOGLE_CLIENT_SECRET: 'ci-google-secret'
          APPWRITE_API_KEY: 'ci-appwrite-key'
          CRON_SECRET: 'ci-cron-secret'
          TRACKING_TOKEN_SECRET: 'ci-tracking-secret'

      - name: Run E2E tests
        run: bun run test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build application
        run: bun run build
        env:
          SKIP_ENV_VALIDATION: 'true'
          NEXT_PUBLIC_APPWRITE_ENDPOINT: 'https://test.appwrite.io/v1'
          NEXT_PUBLIC_APPWRITE_PROJECT_ID: 'test-project'
          NEXT_PUBLIC_APPWRITE_DATABASE_ID: 'test-db'
          NEXT_PUBLIC_APPWRITE_CONTACTS_COLLECTION_ID: 'test-contacts'
          NEXT_PUBLIC_APPWRITE_CAMPAIGNS_COLLECTION_ID: 'test-campaigns'
          NEXT_PUBLIC_APPWRITE_TEMPLATES_COLLECTION_ID: 'test-templates'
          NEXT_PUBLIC_APPWRITE_CONTACT_GROUPS_COLLECTION_ID: 'test-groups'
          NEXT_PUBLIC_APPWRITE_ATTACHMENTS_BUCKET_ID: 'test-bucket'
          NEXT_PUBLIC_APPWRITE_DRAFT_EMAILS_COLLECTION_ID: 'test-drafts'
          NEXT_PUBLIC_APPWRITE_SIGNATURES_COLLECTION_ID: 'test-sigs'
          NEXT_PUBLIC_APPWRITE_UNSUBSCRIBES_COLLECTION_ID: 'test-unsubs'
          NEXT_PUBLIC_APPWRITE_WEBHOOKS_COLLECTION_ID: 'test-webhooks'
          NEXT_PUBLIC_APPWRITE_TRACKING_EVENTS_COLLECTION_ID: 'test-tracking'
          NEXT_PUBLIC_APPWRITE_AB_TESTS_COLLECTION_ID: 'test-ab'
          NEXTAUTH_SECRET: 'ci-nextauth-secret'
          GOOGLE_CLIENT_ID: 'ci-google-client'
          GOOGLE_CLIENT_SECRET: 'ci-google-secret'
          APPWRITE_API_KEY: 'ci-appwrite-key'
          CRON_SECRET: 'ci-cron-secret'
          TRACKING_TOKEN_SECRET: 'ci-tracking-secret'

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run audit
        run: bun audit --audit-level=high
        continue-on-error: true

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [build, e2e-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
